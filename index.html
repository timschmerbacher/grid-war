<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid War</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f0f0eb;color:#1a1a1a;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:1px solid #aaa;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:500;background:#e8e8e2;color:#1a1a1a}
button:hover{background:#ddddd6}
input{font-family:inherit;border:1px solid #aaa;border-radius:8px;padding:10px;font-size:14px;background:#fff;color:#1a1a1a}
input:focus,button:focus{outline:2px solid #5588cc;outline-offset:-1px}
.card{background:#fff;border-radius:8px;border:1px solid #ccc;padding:12px}
#app{padding:14px;max-width:480px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
#board{display:flex;justify-content:center}
.cell{display:flex;align-items:center;justify-content:center;transition:background .1s;cursor:default}
.unit{border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;user-select:none}
.fog{border-radius:4px;background:#aaa;opacity:.45}
.dot{border-radius:50%;background:#2d7d46;opacity:.7}
.pdest{border-radius:50%;opacity:.7}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── Firebase REST ─────────────────────────────────────────────────────────
const FB="https://grid-war-default-rtdb.europe-west1.firebasedatabase.app";
const fbGet  =async p=>(await fetch(`${FB}/${p}.json`)).json();
const fbSet  =async(p,d)=>fetch(`${FB}/${p}.json`,{method:'PUT',  headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});
const fbPatch=async(p,d)=>fetch(`${FB}/${p}.json`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});

// ── Constants ─────────────────────────────────────────────────────────────
const G=7,MAXR=10;
const INIT_UNITS=[
  {id:'a',p:1,x:0,y:1},{id:'b',p:1,x:0,y:3},{id:'c',p:1,x:0,y:5},
  {id:'d',p:2,x:6,y:1},{id:'e',p:2,x:6,y:3},{id:'f',p:2,x:6,y:5}
];
const INIT_CELLS=Array(G).fill(0).map((_,y)=>Array(G).fill(0).map((_,x)=>x===0?1:x===G-1?2:0));
const genCode=()=>{const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';return Array(4).fill(0).map(()=>c[Math.floor(Math.random()*c.length)]).join('');};

// ── Game Logic ────────────────────────────────────────────────────────────
const calcScore=cells=>{let p1=0,p2=0;cells.forEach(r=>r.forEach(c=>{if(c===1)p1++;else if(c===2)p2++;}));return{p1,p2};};

const resolveRound=(units,cells,m1,m2,round)=>{
  const mv={...(m1||{}),...(m2||{})};
  let next=units.map(u=>{const m=mv[u.id];return{...u,nx:m?m.x:u.x,ny:m?m.y:u.y};});
  const dead=new Set(),log=[];
  for(let i=0;i<next.length;i++)for(let j=i+1;j<next.length;j++){
    const a=next[i],b=next[j];
    if(a.p===b.p||dead.has(a.id)||dead.has(b.id))continue;
    if(a.nx===b.nx&&a.ny===b.ny){dead.add(a.p===1?b.id:a.id);log.push(`Kampf (${a.nx+1},${a.ny+1}): ${a.p===1?'Blau':'Rot'} siegt`);}
  }
  const alive=next.filter(u=>!dead.has(u.id)).map(({nx,ny,...u})=>({...u,x:nx,y:ny}));
  const nc=cells.map(r=>[...r]);
  alive.forEach(u=>{nc[u.y][u.x]=u.p;});
  const score=calcScore(nc);
  const p1c=alive.filter(u=>u.p===1).length,p2c=alive.filter(u=>u.p===2).length;
  const nr=round+1;
  let ended=false,winner=null;
  if(!p1c||!p2c||nr>MAXR){
    ended=true;
    winner=!p1c&&!p2c?0:!p1c?2:!p2c?1:score.p1>score.p2?1:score.p2>score.p1?2:0;
    log.push(winner===0?'Unentschieden!':winner===1?'Blau gewinnt!':'Rot gewinnt!');
  }
  log.push(`Runde ${round}: Blau ${score.p1} – Rot ${score.p2}`);
  return{units:alive,cells:nc,score,round:nr,ended,winner,log};
};

// ── State ─────────────────────────────────────────────────────────────────
let S={
  screen:'home', // home | game
  role:null, gameCode:'', gs:null,
  sel:null, moves:{}, submitted:false,
  err:'', copied:false
};
let pollTimer=null;

const stopPoll=()=>{if(pollTimer){clearInterval(pollTimer);pollTimer=null;}};
const startPoll=code=>{
  stopPoll();
  pollTimer=setInterval(async()=>{
    try{
      const data=await fbGet(`games/${code}`);
      if(!data)return;
      const prev=S.gs;
      if(prev&&(data.round!==prev.round||data.phase!==prev.phase)){
        S.submitted=false;S.moves={};S.sel=null;
      }
      S.gs=data;
      render();
    }catch(ex){console.warn(ex);}
  },2500);
};

// ── Render helpers ────────────────────────────────────────────────────────
const h=(tag,attrs={},children=[])=>{
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of(Array.isArray(children)?children:[children])){
    if(c==null||c===false)continue;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return el;
};

const btn=(text,onClick,style={})=>h('button',{onclick:onClick,style},{text});
const csz=()=>Math.min(Math.floor((Math.min(window.innerWidth-28,440))/G),58);

// ── Screens ───────────────────────────────────────────────────────────────
function renderHome(){
  const joinInput=h('input',{type:'text',placeholder:'CODE',maxlength:'4',
    style:{flex:'1',padding:'13px',fontSize:'22px',letterSpacing:'8px',textAlign:'center',fontWeight:'700'}});
  joinInput.addEventListener('input',()=>{joinInput.value=joinInput.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4);});
  joinInput.addEventListener('keydown',ev=>{if(ev.key==='Enter')doJoin(joinInput.value);});

  const errEl=h('p',{style:{fontSize:'13px',color:'#c01c28',margin:'0',minHeight:'18px'}},S.err);

  const el=h('div',{style:{padding:'1.5rem 1rem',maxWidth:'400px',margin:'0 auto',display:'flex',flexDirection:'column',gap:'16px'}},[
    h('div',{},[
      h('h1',{style:{fontSize:'28px',fontWeight:'700',marginBottom:'6px',color:'#1a1a1a'}},'Grid War'),
      h('p',{style:{fontSize:'14px',color:'#555',lineHeight:'1.6'}},'Taktik-Duell für 2 Spieler — jeder auf seinem eigenen Gerät.')
    ]),
    h('div',{class:'card',style:{fontSize:'13px',color:'#555',lineHeight:'2.1'}},[
      h('strong',{style:{color:'#1a1a1a',display:'block',marginBottom:'4px'}},'Spielablauf:'),
      h('div',{},'1. Spieler 1 erstellt Spiel → teilt 4-stelligen Code'),
      h('div',{},'2. Spieler 2 gibt Code ein → Spiel startet'),
      h('div',{},'3. Beide planen Züge heimlich → bestätigen'),
      h('div',{},'4. Runde löst sich automatisch auf'),
      h('div',{style:{marginTop:'8px',fontSize:'12px',color:'#999'}},'Feinde als graue Blöcke sichtbar — Züge bleiben geheim')
    ]),
    h('button',{onclick:doCreate,style:{background:'#ddeeff',color:'#1a5fb4',border:'1px solid #5588cc',padding:'14px',fontSize:'16px',borderRadius:'8px',cursor:'pointer',fontWeight:'600'}},
      '+ Neues Spiel erstellen'),
    h('div',{style:{display:'flex',gap:'8px'}},[
      joinInput,
      h('button',{onclick:()=>doJoin(joinInput.value),style:{padding:'13px 20px',fontSize:'15px'}},
        'Beitreten')
    ]),
    errEl
  ]);
  return el;
}

function renderGame(){
  const gs=S.gs;
  if(!gs)return h('div',{style:{padding:'2rem',textAlign:'center',color:'#999'}},'Verbinde...');

  const role=S.role;
  const sz=csz();
  const myUnits=gs.units.filter(u=>u.p===role);
  const selUnit=S.sel?gs.units.find(u=>u.id===S.sel):null;

  // Valid targets for selected unit
  const valid=new Set();
  if(selUnit){
    for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){
      const nx=selUnit.x+dx,ny=selUnit.y+dy;
      if(nx>=0&&nx<G&&ny>=0&&ny<G){
        const ownThere=gs.units.find(u=>u.p===role&&u.x===nx&&u.y===ny&&u.id!==S.sel);
        const planThere=Object.entries(S.moves).find(([id,m])=>id!==S.sel&&m.x===nx&&m.y===ny);
        if(!ownThere&&!planThere)valid.add(nx+','+ny);
      }
    }
  }

  // Board
  const rows=[];
  for(let y=0;y<G;y++){
    for(let x=0;x<G;x++){
      const cell=gs.cells[y][x];
      const unit=gs.units.find(u=>u.x===x&&u.y===y);
      const key=x+','+y;
      const isValid=valid.has(key);
      const isPDest=Object.entries(S.moves).find(([,m])=>m.x===x&&m.y===y);
      const isSelU=unit&&S.sel===unit.id;
      const hasPlan=unit&&S.moves[unit.id];
      const isEnemy=unit&&unit.p!==role;
      const showUnit=unit&&(!isEnemy||gs.ended);

      let bg=cell===1?'#b8d4f0':cell===2?'#f0b8b8':'#deded8';
      if(isValid)bg='#b8f0d0';

      const outline=isSelU?'3px solid #856f00':isValid?'2px dashed #2d7d46':'none';
      const canClick=((unit&&unit.p===role)||isValid)&&gs.phase==='planning'&&!S.submitted&&!gs.ended;

      const cellEl=h('div',{style:{width:sz+'px',height:sz+'px',background:bg,display:'flex',
        alignItems:'center',justifyContent:'center',cursor:canClick?'pointer':'default',
        outline,outlineOffset:'-2px',transition:'background .1s'}});

      if(showUnit){
        const us=Math.round(sz*.6);
        const unitEl=h('div',{style:{width:us+'px',height:us+'px',borderRadius:'50%',background:'#fff',
          border:`2.5px solid ${unit.p===1?'#1a5fb4':'#c01c28'}`,display:'flex',alignItems:'center',
          justifyContent:'center',fontSize:Math.max(10,Math.round(sz*.23))+'px',fontWeight:'700',
          color:unit.p===1?'#1a5fb4':'#c01c28',opacity:hasPlan?'0.4':'1',userSelect:'none'}},
          unit.id.toUpperCase());
        cellEl.appendChild(unitEl);
      } else if(isEnemy&&!gs.ended){
        const fs=Math.round(sz*.46);
        cellEl.appendChild(h('div',{style:{width:fs+'px',height:fs+'px',borderRadius:'4px',background:'#aaa',opacity:'.45'}}));
      }
      if(!unit&&isPDest){
        const ps=Math.round(sz*.42);
        const col=role===1?'#1a5fb4':'#c01c28';
        cellEl.appendChild(h('div',{style:{width:ps+'px',height:ps+'px',borderRadius:'50%',border:`2px dashed ${col}`,opacity:'.7'}}));
      }
      if(isValid&&!unit&&!isPDest){
        cellEl.appendChild(h('div',{style:{width:'6px',height:'6px',borderRadius:'50%',background:'#2d7d46',opacity:'.7'}}));
      }

      cellEl.addEventListener('click',()=>onCellClick(x,y,unit,isValid));
      rows.push(cellEl);
    }
  }

  const boardGrid=h('div',{style:{display:'inline-grid',gridTemplateColumns:`repeat(${G},${sz}px)`,
    gap:'2px',background:'#ccc',border:'2px solid #ccc',borderRadius:'8px',overflow:'hidden'}},rows);
  const boardWrap=h('div',{style:{display:'flex',justifyContent:'center'}},boardGrid);

  // Score bar
  const scorebar=h('div',{class:'card',style:{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:'8px',padding:'10px 16px',alignItems:'center'}},[
    h('div',{},[
      h('div',{style:{fontSize:'11px',color:'#1a5fb4',fontWeight:'600',marginBottom:'1px'}},'BLAU'),
      h('div',{style:{fontSize:'30px',fontWeight:'700',color:'#1a5fb4'}},String(gs.score?.p1??7))
    ]),
    h('div',{style:{fontSize:'11px',color:'#999',textAlign:'center'}},'Felder'),
    h('div',{style:{textAlign:'right'}},[
      h('div',{style:{fontSize:'11px',color:'#c01c28',fontWeight:'600',marginBottom:'1px'}},'ROT'),
      h('div',{style:{fontSize:'30px',fontWeight:'700',color:'#c01c28'}},String(gs.score?.p2??7))
    ])
  ]);

  // Header
  const roleLabel=role===1?'Blau':'Rot';
  const roleBg=role===1?'#ddeeff':'#ffdddd';
  const roleColor=role===1?'#1a5fb4':'#c01c28';
  const roleBord=role===1?'#5588cc':'#cc6666';
  const roundText=gs.ended?'Spielende':gs.phase==='waiting'?'Warte auf Spieler 2':`Runde ${gs.round} / ${MAXR}`;

  const header=h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},[
    h('button',{onclick:leaveGame,style:{background:'none',border:'none',color:'#555',padding:'0',fontSize:'13px',cursor:'pointer'}},'← Menü'),
    h('span',{style:{fontSize:'13px',fontWeight:'600'}},roundText),
    h('span',{style:{fontSize:'12px',padding:'3px 10px',borderRadius:'8px',background:roleBg,color:roleColor,fontWeight:'600',border:`1px solid ${roleBord}`}},roleLabel)
  ]);

  // Phase UI
  let phaseEl=null;
  const oppSubmitted=gs.phase==='planning'&&(role===1?gs.moves2!=null:gs.moves1!=null);
  const myMoveCount=Object.keys(S.moves).length;

  if(gs.phase==='waiting'){
    phaseEl=h('div',{class:'card',style:{textAlign:'center',padding:'20px'}},[
      h('p',{style:{fontSize:'14px',color:'#555',marginBottom:'12px'}},'Code an Spieler 2 schicken:'),
      h('div',{style:{fontSize:'42px',fontWeight:'700',letterSpacing:'14px',marginBottom:'14px'}},S.gameCode),
      h('button',{onclick:()=>{
        try{navigator.clipboard.writeText(S.gameCode);S.copied=true;render();setTimeout(()=>{S.copied=false;render();},2000);}catch{}
      },style:{background:S.copied?'#ddffee':'#e8e8e2',color:S.copied?'#2d7d46':'#1a1a1a',
        border:`1px solid ${S.copied?'#55aa77':'#aaa'}`,padding:'10px 28px'}},
        S.copied?'✓ Kopiert!':'Code kopieren')
    ]);
  } else if(gs.ended){
    const wc=gs.winner===role?'#2d7d46':gs.winner===0?'#555':'#c01c28';
    const wb=gs.winner===role?'#2d7d46':gs.winner===0?'#ccc':'#c01c28';
    const wt=gs.winner===role?'Du gewinnst! 🏆':gs.winner===0?'Unentschieden':'Niederlage';
    phaseEl=h('div',{style:{background:'#fff',borderRadius:'12px',border:`2px solid ${wb}`,padding:'20px',textAlign:'center',display:'flex',flexDirection:'column',gap:'12px'}},[
      h('div',{style:{fontSize:'24px',fontWeight:'700',color:wc}},wt),
      h('div',{style:{fontSize:'14px',color:'#555'}},`Blau ${gs.score?.p1} – Rot ${gs.score?.p2}`),
      h('button',{onclick:leaveGame,style:{padding:'11px 28px',fontSize:'15px',marginTop:'4px'}},'Neues Spiel')
    ]);
  } else if(gs.phase==='planning'&&!S.submitted){
    const hint=oppSubmitted?'⏳ Gegner wartet auf dich!':
      S.sel?'Zielfeld wählen (1 Schritt, auch diagonal)':
      myMoveCount>0?`${myMoveCount} / ${myUnits.length} Einheiten geplant`:
      'Eigene Einheit antippen zum Auswählen';
    const hintColor=oppSubmitted?'#856f00':S.sel?'#2d7d46':'#555';
    const confirmBg=myMoveCount>0?'#ddeeff':'#e8e8e2';
    const confirmColor=myMoveCount>0?'#1a5fb4':'#999';
    const confirmBord=myMoveCount>0?'#5588cc':'#ccc';
    const confirmText=myMoveCount>0?`Züge bestätigen (${myMoveCount} / ${myUnits.length})`:'Runde überspringen';

    phaseEl=h('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}},[
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',minHeight:'22px'}},[
        h('span',{style:{fontSize:'13px',color:hintColor}},hint),
        myMoveCount>0?h('button',{onclick:()=>{S.moves={};S.sel=null;render();},
          style:{fontSize:'12px',padding:'4px 10px',color:'#999'}},'Zurücksetzen'):document.createTextNode('')
      ]),
      h('button',{onclick:doSubmit,style:{background:confirmBg,color:confirmColor,
        border:`1px solid ${confirmBord}`,padding:'13px',fontSize:'14px',borderRadius:'8px',
        cursor:'pointer',fontWeight:'500'}},confirmText)
    ]);
  } else if(gs.phase==='planning'&&S.submitted){
    phaseEl=h('div',{class:'card',style:{textAlign:'center',padding:'18px'}},[
      h('div',{style:{fontSize:'14px',color:'#856f00',fontWeight:'600'}},'✓ Züge bestätigt'),
      h('p',{style:{fontSize:'13px',color:'#555',marginTop:'8px'}},'Warte auf Gegner...')
    ]);
  }

  // Log
  const logItems=(gs.log||[]).slice().reverse().slice(0,7).map((l,i)=>
    h('div',{style:{fontSize:'12px',color:i===0?'#1a1a1a':'#999',marginBottom:'2px',lineHeight:'1.5'}},l)
  );
  const logEl=logItems.length?h('div',{class:'card',style:{padding:'10px 12px'}},
    h('div',{style:{maxHeight:'80px',overflowY:'auto'}},logItems)):null;

  const children=[header,scorebar,boardWrap];
  if(phaseEl)children.push(phaseEl);
  if(logEl)children.push(logEl);

  return h('div',{style:{padding:'12px 14px',maxWidth:'480px',margin:'0 auto',display:'flex',flexDirection:'column',gap:'10px'}},children);
}

// ── Cell click ────────────────────────────────────────────────────────────
function onCellClick(x,y,unit,isValid){
  const gs=S.gs;
  if(!gs||gs.phase!=='planning'||S.submitted||gs.ended)return;
  const myUnits=gs.units.filter(u=>u.p===S.role);
  const onCell=myUnits.find(u=>u.x===x&&u.y===y);
  if(onCell){S.sel=S.sel===onCell.id?null:onCell.id;render();return;}
  if(S.sel&&isValid){S.moves={...S.moves,[S.sel]:{x,y}};S.sel=null;render();}
  else{S.sel=null;render();}
}

// ── Actions ───────────────────────────────────────────────────────────────
async function doCreate(){
  S.err='';render();
  const code=genCode();
  const state={code,phase:'waiting',round:1,cells:INIT_CELLS,units:INIT_UNITS,
    score:{p1:7,p2:7},moves1:null,moves2:null,log:['Warte auf Spieler 2...'],ended:false,winner:null};
  await fbSet(`games/${code}`,state);
  S.gameCode=code;S.role=1;S.gs=state;S.screen='game';
  S.moves={};S.submitted=false;S.sel=null;
  startPoll(code);render();
}

async function doJoin(code){
  code=code.trim().toUpperCase();
  if(!code){S.err='Bitte Code eingeben';render();return;}
  S.err='';render();
  const data=await fbGet(`games/${code}`);
  if(!data){S.err='Spiel nicht gefunden!';render();return;}
  if(data.phase!=='waiting'){S.err='Spiel bereits gestartet!';render();return;}
  const updated={...data,phase:'planning',log:[...(data.log||[]),"Spieler 2 beigetreten — Los geht's!"]};
  await fbSet(`games/${code}`,updated);
  S.gameCode=code;S.role=2;S.gs=updated;S.screen='game';
  S.moves={};S.submitted=false;S.sel=null;
  startPoll(code);render();
}

async function doSubmit(){
  if(S.submitted||!S.gs)return;
  const current=await fbGet(`games/${S.gameCode}`);
  const myKey=S.role===1?'moves1':'moves2';
  const otherKey=S.role===1?'moves2':'moves1';
  const otherMoves=current[otherKey];
  if(otherMoves!==null&&otherMoves!==undefined){
    const m1=S.role===1?S.moves:otherMoves;
    const m2=S.role===2?S.moves:otherMoves;
    const res=resolveRound(current.units,current.cells,m1,m2,current.round);
    const newLog=[...(current.log||[]).slice(-5),...res.log];
    await fbSet(`games/${S.gameCode}`,{...current,units:res.units,cells:res.cells,score:res.score,
      round:res.round,ended:res.ended,winner:res.winner,moves1:null,moves2:null,log:newLog,
      phase:res.ended?'ended':'planning'});
    S.submitted=false;S.moves={};S.sel=null;
  }else{
    await fbPatch(`games/${S.gameCode}`,{[myKey]:S.moves});
    S.submitted=true;
  }
  render();
}

function leaveGame(){
  stopPoll();S.screen='home';S.gs=null;S.role=null;
  S.moves={};S.submitted=false;S.sel=null;S.err='';render();
}

// ── Render ────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  app.appendChild(S.screen==='home'?renderHome():renderGame());
}

render();
</script>
</body>
</html>
