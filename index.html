<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid War</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f0eb; color: #1a1a1a; }
    button, input, textarea { font-family: inherit; }
    textarea:focus, input:focus { outline: 2px solid #5588cc; outline-offset: -1px; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyBquIKBXv62RY2e52NfZ79ZtHsXFqWTHzs",
  authDomain: "grid-war.firebaseapp.com",
  databaseURL: "https://grid-war-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "grid-war",
  storageBucket: "grid-war.firebasestorage.app",
  messagingSenderId: "486782061923",
  appId: "1:486782061923:web:6c3e0515b38db2b7f09756"
});
const db = firebase.database();

const { useState, useEffect, useRef } = React;
const e = React.createElement;
const G = 7, MAXR = 10;

const INIT_UNITS = [
  { id: 'a', p: 1, x: 0, y: 1 }, { id: 'b', p: 1, x: 0, y: 3 }, { id: 'c', p: 1, x: 0, y: 5 },
  { id: 'd', p: 2, x: 6, y: 1 }, { id: 'e', p: 2, x: 6, y: 3 }, { id: 'f', p: 2, x: 6, y: 5 }
];
const INIT_CELLS = Array(G).fill(0).map((_, y) => Array(G).fill(0).map((_, x) => x === 0 ? 1 : x === G - 1 ? 2 : 0));

const genCode = () => {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array(4).fill(0).map(() => chars[Math.floor(Math.random() * chars.length)]).join('');
};

const calcScore = cells => {
  let p1 = 0, p2 = 0;
  cells.forEach(r => r.forEach(c => { if (c === 1) p1++; else if (c === 2) p2++; }));
  return { p1, p2 };
};

const resolveRound = (units, cells, m1, m2, round) => {
  const mv = { ...(m1 || {}), ...(m2 || {}) };
  let next = units.map(u => { const m = mv[u.id]; return { ...u, nx: m ? m.x : u.x, ny: m ? m.y : u.y }; });
  const dead = new Set(), log = [];
  for (let i = 0; i < next.length; i++) for (let j = i + 1; j < next.length; j++) {
    const a = next[i], b = next[j];
    if (a.p === b.p || dead.has(a.id) || dead.has(b.id)) continue;
    if (a.nx === b.nx && a.ny === b.ny) {
      dead.add(a.p === 1 ? b.id : a.id);
      log.push(`Kampf (${a.nx + 1},${a.ny + 1}): ${a.p === 1 ? 'Blau' : 'Rot'} siegt`);
    }
  }
  const alive = next.filter(u => !dead.has(u.id)).map(({ nx, ny, ...u }) => ({ ...u, x: nx, y: ny }));
  const nc = cells.map(r => [...r]);
  alive.forEach(u => { nc[u.y][u.x] = u.p; });
  const score = calcScore(nc);
  const p1c = alive.filter(u => u.p === 1).length, p2c = alive.filter(u => u.p === 2).length;
  const nr = round + 1;
  let ended = false, winner = null;
  if (!p1c || !p2c || nr > MAXR) {
    ended = true;
    winner = !p1c && !p2c ? 0 : !p1c ? 2 : !p2c ? 1 : score.p1 > score.p2 ? 1 : score.p2 > score.p1 ? 2 : 0;
    log.push(winner === 0 ? 'Unentschieden!' : winner === 1 ? 'Blau gewinnt!' : 'Rot gewinnt!');
  }
  log.push(`Runde ${round}: Blau ${score.p1} – Rot ${score.p2}`);
  return { units: alive, cells: nc, score, round: nr, ended, winner, log };
};

const C = {
  bg: '#f0f0eb', card: '#ffffff', surf: '#e8e8e2',
  bord: '#ccccC4', bordSec: '#aaaaA0',
  txt: '#1a1a1a', muted: '#555550', hint: '#999990',
  blue: '#1a5fb4', blueBg: '#ddeeff', blueBord: '#5588cc',
  red: '#c01c28', redBg: '#ffdddd', redBord: '#cc6666',
  green: '#2d7d46', greenBg: '#ddffee', greenBord: '#55aa77',
  amber: '#856f00', amberBg: '#fffacc', amberBord: '#ccaa00',
  cellN: '#deded8', cellBlue: '#b8d4f0', cellRed: '#f0b8b8', cellGreen: '#b8f0d0',
  rad: 8, radLg: 12
};

const Btn = ({ onClick, children, style = {} }) =>
  e('button', { onClick, style: { border: `1px solid ${C.bordSec}`, borderRadius: C.rad, padding: '10px 16px', fontSize: 14, fontWeight: 500, cursor: 'pointer', background: C.surf, color: C.txt, ...style } }, children);

const Card = ({ children, style = {} }) =>
  e('div', { style: { background: C.card, borderRadius: C.rad, border: `1px solid ${C.bord}`, padding: '12px', ...style } }, children);

function App() {
  const [screen, setScreen] = useState('home');
  const [role, setRole] = useState(null);
  const [gameCode, setGameCode] = useState('');
  const [joinInput, setJoinInput] = useState('');
  const [gs, setGs] = useState(null);
  const [sel, setSel] = useState(null);
  const [moves, setMoves] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [err, setErr] = useState('');
  const [copied, setCopied] = useState(false);
  const listenerRef = useRef(null);

  const stopListener = () => { if (listenerRef.current) { listenerRef.current(); listenerRef.current = null; } };

  const startListener = code => {
    stopListener();
    const ref = db.ref(`games/${code}`);
    const handler = ref.on('value', snap => {
      const data = snap.val();
      if (!data) return;
      setGs(prev => {
        if (!prev) return data;
        if (data.round !== prev.round || data.phase !== prev.phase) {
          setSubmitted(false); setMoves({}); setSel(null);
        }
        return data;
      });
    });
    listenerRef.current = () => ref.off('value', handler);
  };

  useEffect(() => () => stopListener(), []);

  const createGame = async () => {
    setErr('');
    const code = genCode();
    const state = {
      code, phase: 'waiting', round: 1,
      cells: INIT_CELLS, units: INIT_UNITS,
      score: { p1: 7, p2: 7 },
      moves1: null, moves2: null,
      log: ['Warte auf Spieler 2...'],
      ended: false, winner: null
    };
    await db.ref(`games/${code}`).set(state);
    setGameCode(code); setRole(1); setGs(state);
    setScreen('game'); startListener(code);
  };

  const joinGame = async () => {
    const code = joinInput.trim().toUpperCase();
    if (!code) { setErr('Bitte Code eingeben'); return; }
    setErr('');
    const snap = await db.ref(`games/${code}`).get();
    if (!snap.exists()) { setErr('Spiel nicht gefunden!'); return; }
    const data = snap.val();
    if (data.phase !== 'waiting') { setErr('Spiel bereits voll oder gestartet!'); return; }
    await db.ref(`games/${code}`).update({ phase: 'planning', log: [...data.log, 'Spieler 2 beigetreten — Runde 1 startet!'] });
    setGameCode(code); setRole(2); setGs({ ...data, phase: 'planning' });
    setScreen('game'); startListener(code);
  };

  const submitMoves = async () => {
    if (submitted || !gs) return;
    const key = role === 1 ? 'moves1' : 'moves2';
    const snap = await db.ref(`games/${gameCode}`).get();
    const current = snap.val();
    const otherKey = role === 1 ? 'moves2' : 'moves1';
    const otherMoves = current[otherKey];
    if (otherMoves !== null && otherMoves !== undefined) {
      const m1 = role === 1 ? moves : otherMoves;
      const m2 = role === 2 ? moves : otherMoves;
      const res = resolveRound(current.units, current.cells, m1, m2, current.round);
      const newLog = [...(current.log || []).slice(-5), ...res.log];
      await db.ref(`games/${gameCode}`).update({
        units: res.units, cells: res.cells, score: res.score,
        round: res.round, ended: res.ended, winner: res.winner,
        moves1: null, moves2: null, log: newLog,
        phase: res.ended ? 'ended' : 'planning'
      });
      setSubmitted(false); setMoves({}); setSel(null);
    } else {
      await db.ref(`games/${gameCode}`).update({ [key]: moves });
      setSubmitted(true);
    }
  };

  const myUnits = (gs?.units || []).filter(u => u.p === role);
  const selUnit = sel ? (gs?.units || []).find(u => u.id === sel) : null;
  const validTargets = new Set();
  if (selUnit && gs) {
    for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++) {
      const nx = selUnit.x + dx, ny = selUnit.y + dy;
      if (nx >= 0 && nx < G && ny >= 0 && ny < G) {
        const ownThere = (gs.units || []).find(u => u.p === role && u.x === nx && u.y === ny && u.id !== sel);
        const planThere = Object.entries(moves).find(([id, m]) => id !== sel && m.x === nx && m.y === ny);
        if (!ownThere && !planThere) validTargets.add(nx + ',' + ny);
      }
    }
  }

  const clickCell = (x, y) => {
    if (!gs || gs.phase !== 'planning' || submitted || gs.ended) return;
    const onCell = myUnits.find(u => u.x === x && u.y === y);
    if (onCell) { setSel(p => p === onCell.id ? null : onCell.id); return; }
    if (sel && validTargets.has(x + ',' + y)) { setMoves(m => ({ ...m, [sel]: { x, y } })); setSel(null); }
    else setSel(null);
  };

  const copy = text => { try { navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch {} };

  const csz = Math.min(Math.floor((Math.min(window.innerWidth - 28, 430)) / G), 60);

  const renderBoard = () => {
    if (!gs) return null;
    return e('div', { style: { display: 'flex', justifyContent: 'center' } },
      e('div', { style: { display: 'inline-grid', gridTemplateColumns: `repeat(${G},${csz}px)`, gap: 2, background: C.bord, border: `2px solid ${C.bord}`, borderRadius: C.rad, overflow: 'hidden' } },
        (gs.cells || INIT_CELLS).map((row, y) => row.map((cell, x) => {
          const unit = (gs.units || []).find(u => u.x === x && u.y === y);
          const key = x + ',' + y;
          const isValid = validTargets.has(key);
          const isPDest = Object.entries(moves).find(([, m]) => m.x === x && m.y === y);
          const isSelU = unit && sel === unit.id;
          const hasPlan = unit && moves[unit.id];
          const isEnemy = unit && unit.p !== role;
          const showUnit = unit && (!isEnemy || gs.ended);
          let bg = cell === 1 ? C.cellBlue : cell === 2 ? C.cellRed : C.cellN;
          if (isValid) bg = C.cellGreen;
          return e('div', {
            key, onClick: () => clickCell(x, y),
            style: {
              width: csz, height: csz, background: bg,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              cursor: ((unit?.p === role) || isValid) && gs.phase === 'planning' && !submitted && !gs.ended ? 'pointer' : 'default',
              outline: isSelU ? `3px solid ${C.amber}` : isValid ? `2px dashed ${C.green}` : 'none',
              outlineOffset: '-2px', transition: 'background 0.1s'
            }
          },
            showUnit && e('div', {
              style: {
                width: Math.round(csz * 0.6), height: Math.round(csz * 0.6), borderRadius: '50%',
                background: '#fff', border: `2.5px solid ${unit.p === 1 ? C.blue : C.red}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: Math.max(11, Math.round(csz * 0.24)), fontWeight: 700,
                color: unit.p === 1 ? C.blue : C.red, opacity: hasPlan ? 0.4 : 1, userSelect: 'none'
              }
            }, unit.id.toUpperCase()),
            isEnemy && !gs.ended && e('div', { style: { width: Math.round(csz * 0.46), height: Math.round(csz * 0.46), borderRadius: 4, background: C.bordSec, opacity: 0.45 } }),
            !unit && isPDest && e('div', { style: { width: Math.round(csz * 0.42), height: Math.round(csz * 0.42), borderRadius: '50%', border: `2px dashed ${role === 1 ? C.blue : C.red}`, opacity: 0.7 } }),
            isValid && !unit && !isPDest && e('div', { style: { width: 7, height: 7, borderRadius: '50%', background: C.green, opacity: 0.7 } })
          );
        }))
      )
    );
  };

  // ── HOME ──
  if (screen === 'home') return e('div', { style: { padding: '1.5rem 1rem', maxWidth: 400, margin: '0 auto', background: C.bg, minHeight: '100vh', display: 'flex', flexDirection: 'column', gap: 16 } },
    e('div', null,
      e('h1', { style: { fontSize: 28, fontWeight: 700, margin: '0 0 6px', color: C.txt } }, 'Grid War'),
      e('p', { style: { fontSize: 14, color: C.muted, lineHeight: 1.6, margin: 0 } }, 'Taktik-Duell für 2 Spieler — jeder auf seinem eigenen Gerät.')
    ),
    e(Card, null,
      e('div', { style: { fontSize: 13, color: C.muted, lineHeight: 2 } },
        e('strong', { style: { color: C.txt, fontWeight: 600, display: 'block', marginBottom: 4 } }, 'Spielablauf:'),
        e('div', null, '1. Spieler 1 erstellt Spiel → teilt 4-stelligen Code'),
        e('div', null, '2. Spieler 2 gibt Code ein → Spiel startet'),
        e('div', null, '3. Beide planen Züge → bestätigen unabhängig'),
        e('div', null, '4. Runde löst sich automatisch auf sobald beide fertig'),
        e('div', { style: { marginTop: 8, color: C.hint, fontSize: 12 } }, 'Feindliche Einheiten sichtbar als graue Blöcke — Züge bleiben geheim bis zur Auflösung')
      )
    ),
    e(Btn, { onClick: createGame, style: { background: C.blueBg, color: C.blue, border: `1px solid ${C.blueBord}`, padding: '14px', fontSize: 16 } }, '+ Neues Spiel erstellen'),
    e('div', { style: { display: 'flex', gap: 8 } },
      e('input', {
        value: joinInput, onChange: ev => setJoinInput(ev.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 4)),
        placeholder: 'CODE', onKeyDown: ev => ev.key === 'Enter' && joinGame(),
        style: { flex: 1, padding: '13px', borderRadius: C.rad, border: `1px solid ${C.bordSec}`, background: C.card, color: C.txt, fontSize: 22, letterSpacing: 8, textAlign: 'center', fontWeight: 700 }
      }),
      e(Btn, { onClick: joinGame, style: { padding: '13px 20px', fontSize: 15 } }, 'Beitreten')
    ),
    err && e('p', { style: { fontSize: 13, color: C.red, margin: 0 } }, err)
  );

  // ── GAME ──
  if (!gs) return e('div', { style: { padding: '2rem', textAlign: 'center', color: C.muted, background: C.bg, minHeight: '100vh' } }, 'Verbinde...');

  const oppSubmitted = gs.phase === 'planning' && (role === 1 ? gs.moves2 !== null && gs.moves2 !== undefined : gs.moves1 !== null && gs.moves1 !== undefined);
  const myMoveCount = Object.keys(moves).length;

  const leaveGame = () => { stopListener(); setScreen('home'); setGs(null); setRole(null); setMoves({}); setSubmitted(false); setSel(null); setErr(''); };

  return e('div', { style: { padding: '12px 14px', maxWidth: 480, margin: '0 auto', background: C.bg, minHeight: '100vh', display: 'flex', flexDirection: 'column', gap: 10 } },

    e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
      e(Btn, { onClick: leaveGame, style: { background: 'none', border: 'none', color: C.muted, padding: 0, fontSize: 13 } }, '← Menü'),
      e('span', { style: { fontSize: 13, fontWeight: 600, color: C.txt } }, gs.ended ? 'Spielende' : gs.phase === 'waiting' ? 'Warte auf Spieler 2' : `Runde ${gs.round} / ${MAXR}`),
      e('span', { style: { fontSize: 12, padding: '3px 10px', borderRadius: C.rad, background: role === 1 ? C.blueBg : C.redBg, color: role === 1 ? C.blue : C.red, fontWeight: 600, border: `1px solid ${role === 1 ? C.blueBord : C.redBord}` } }, role === 1 ? 'Blau' : 'Rot')
    ),

    e(Card, { style: { display: 'grid', gridTemplateColumns: '1fr auto 1fr', gap: 8, padding: '10px 16px', alignItems: 'center' } },
      e('div', null,
        e('div', { style: { fontSize: 11, color: C.blue, fontWeight: 600, marginBottom: 1 } }, 'BLAU'),
        e('div', { style: { fontSize: 30, fontWeight: 700, color: C.blue } }, gs.score?.p1 ?? 7)
      ),
      e('div', { style: { fontSize: 11, color: C.hint, textAlign: 'center' } }, 'Felder'),
      e('div', { style: { textAlign: 'right' } },
        e('div', { style: { fontSize: 11, color: C.red, fontWeight: 600, marginBottom: 1 } }, 'ROT'),
        e('div', { style: { fontSize: 30, fontWeight: 700, color: C.red } }, gs.score?.p2 ?? 7)
      )
    ),

    renderBoard(),

    gs.phase === 'waiting' ? e(Card, { style: { textAlign: 'center', padding: '20px' } },
      e('p', { style: { fontSize: 14, color: C.muted, margin: '0 0 12px' } }, 'Code an Spieler 2 schicken:'),
      e('div', { style: { fontSize: 40, fontWeight: 700, letterSpacing: 12, color: C.txt, margin: '0 0 14px' } }, gameCode),
      e(Btn, { onClick: () => copy(gameCode), style: { background: copied ? C.greenBg : C.surf, color: copied ? C.green : C.txt, border: `1px solid ${copied ? C.greenBord : C.bordSec}`, padding: '10px 24px' } }, copied ? '✓ Kopiert!' : 'Code kopieren')
    ) :

    gs.ended ? e('div', { style: { background: C.card, borderRadius: C.radLg, border: `2px solid ${gs.winner === role ? C.green : gs.winner === 0 ? C.bord : C.red}`, padding: '20px', textAlign: 'center', display: 'flex', flexDirection: 'column', gap: 12 } },
      e('div', { style: { fontSize: 24, fontWeight: 700, color: gs.winner === role ? C.green : gs.winner === 0 ? C.muted : C.red } },
        gs.winner === role ? 'Du gewinnst! 🏆' : gs.winner === 0 ? 'Unentschieden' : 'Niederlage'),
      e('div', { style: { fontSize: 14, color: C.muted } }, `Blau ${gs.score?.p1} – Rot ${gs.score?.p2}`),
      e(Btn, { onClick: leaveGame, style: { padding: '11px 28px', fontSize: 15 } }, 'Neues Spiel')
    ) :

    gs.phase === 'planning' && !submitted ? e('div', { style: { display: 'flex', flexDirection: 'column', gap: 8 } },
      e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', minHeight: 22 } },
        e('span', { style: { fontSize: 13, color: oppSubmitted ? C.amber : sel ? C.green : C.muted } },
          oppSubmitted ? '⏳ Gegner wartet auf dich!' :
          sel ? 'Zielfeld wählen (1 Schritt, auch diagonal)' :
          myMoveCount > 0 ? `${myMoveCount} / ${myUnits.length} Einheiten geplant` :
          'Eigene Einheit antippen zum Auswählen'),
        myMoveCount > 0 && e(Btn, { onClick: () => { setMoves({}); setSel(null); }, style: { fontSize: 12, padding: '4px 10px', color: C.hint } }, 'Zurücksetzen')
      ),
      e(Btn, { onClick: submitMoves, style: { background: myMoveCount > 0 ? C.blueBg : C.surf, color: myMoveCount > 0 ? C.blue : C.muted, border: `1px solid ${myMoveCount > 0 ? C.blueBord : C.bord}`, padding: '13px', fontSize: 14 } },
        myMoveCount > 0 ? `Züge bestätigen (${myMoveCount} / ${myUnits.length})` : 'Runde ohne Züge überspringen')
    ) :

    gs.phase === 'planning' && submitted ? e(Card, { style: { textAlign: 'center', padding: '18px' } },
      e('div', { style: { fontSize: 14, color: C.amber, fontWeight: 600 } }, '✓ Züge bestätigt'),
      e('p', { style: { fontSize: 13, color: C.muted, margin: '8px 0 0' } }, 'Warte auf Gegner...')
    ) : null,

    (gs.log || []).length > 0 && e(Card, { style: { padding: '10px 12px' } },
      e('div', { style: { maxHeight: 80, overflowY: 'auto' } },
        [...(gs.log || [])].reverse().map((l, i) =>
          e('div', { key: i, style: { fontSize: 12, color: i === 0 ? C.txt : C.hint, marginBottom: 2, lineHeight: 1.5 } }, l)
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
